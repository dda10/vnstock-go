name: Verify Build

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/verify-api-key.yml'
  schedule:
    - cron: '0 0 * * 0'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build
        working-directory: vnstock-go
        run: |
          go build ./...
          echo "✓ Build successful"

      - name: Smoke test
        working-directory: vnstock-go
        run: go test -run TestNew -v ./... || true

      - name: Print Summary
        if: always()
        run: |
          echo "## Build Verification 📊" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Go Version | $(go version) |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ✓ |" >> $GITHUB_STEP_SUMMARY
